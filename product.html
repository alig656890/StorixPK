


<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>StorixPK</title>



<!-- Google Fonts -->

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet">



<!-- Icons -->

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">



<!-- Bootstrap -->

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Shared Styles -->
<link rel="stylesheet" href="style.css">

<!-- Product Page Styles -->
<link rel="stylesheet" href="product.css">

       <meta name="viewport" content="width=device-width, initial-scale=1">

</head>



<body>





<!-- TOPBAR -->

<div class="container-fluid topbar p-1">
    <div class="row d-lg-flex align-items-center">

        <div class="col-lg-6 px-3">
            <a href="https://wa.me/923428453606"
               class="phone-link"
               style="text-decoration:none;">
                <small>
                    <i class="fas fa-phone-alt me-2"></i>
                    +923428453606
                </small>
            </a>
        </div>

        <div class="col-lg-6 text-end px-3">

            <a class="btn btn-sm-square bg-white me-1" href="#">
                <i class="fab fa-facebook-f"></i>
            </a>

            <a class="btn btn-sm-square bg-white me-1 daraz-btn"
               href="https://www.daraz.pk/shop/hulmq2wk/?itemId=1954398719&channelSource=pdp">

                <img src="https://vectorseek.com/wp-content/uploads/2023/06/vectorseek.com-Daraz-Icon-Vector.png"
                     class="daraz-icon">

            </a>

            <a class="btn btn-sm-square bg-white me-1" href="#">
                <i class="fab fa-linkedin-in"></i>
            </a>

            <a class="btn btn-sm-square bg-white" href="#">
                <i class="fab fa-instagram"></i>
            </a>

        </div>

    </div>
</div>



<!-- NAVBAR -->

<nav class="navbar bg-white shadow-sm sticky-top d-flex justify-content-between align-items-center">

    <!-- Logo -->
    <a href="index.html" class="brand-link">
        <img src="2.png" class="brand-logo">

        <span class="logo-text">
            Storix<span>PK</span>
        </span>
    </a>
               <!-- SEARCH BAR -->
<div class="productid d-flex align-items-center">

    <button class="btn btn-outline-secondary"
            onclick="previousProduct()">
        <i class="fas fa-chevron-left"></i>
    </button>

    <input
        type="text"
        id="searchInput"
        class="form-control mx-2"
        placeholder="Product ID..."
        onkeydown="if(event.key==='Enter'){productid();}"
    >

    <button class="btn btn-outline-secondary"
            onclick="nextProduct()">
        <i class="fas fa-chevron-right"></i>
    </button>

</div>


    <!-- Right -->
    <div class="d-flex align-items-center">

        <button type="button" class="btn btn-light position-relative me-2"
                onclick="toggleCart()">

            <i class="fas fa-shopping-cart"></i>

            <span id="cartCount" class="badge cart-count">
                0
            </span>

        </button>

        <button type="button" class="btn place-order-btn"
                onclick="placeOrder()">
            Place Order
        </button>

    </div>


</nav>
      <div id="cartBox" class="cart-box" style="display:none;">

    <div class="cart-header">
        <h5>Your Cart</h5>
    </div>

    <div id="cartItems"></div>

    <button class="btn btn-success w-100 mt-3"
            onclick="goCheckout()">
        Checkout
    </button>

</div>


<div class="container product-page">

    <div class="row">


    
        <!-- LEFT SIDE -->
        <div class="col-lg-8">

<div class="product-gallery d-flex">
                <!-- Side Buttons -->
                <div class="media-menu">

                    <button class="media-btn active" id="imageTab">
                        <i class="far fa-image"></i>
                        <span>Images</span>
                    </button>

                    <button class="media-btn" id="videoTab">
                        <i class="fas fa-video"></i>
                        <span>Videos</span>
                    </button>

                    <button class="media-btn" id="youtubeTab">
                        <i class="fab fa-youtube"></i>
                        <span>YouTube</span>
                    </button>

                    <button class="media-btn" id="modelTab">
                        <i class="fas fa-cube"></i>
                        <span>3D</span>
                    </button>

                </div>

                <!-- Main Viewer -->
              <div class="viewer-wrapper">

        <div class="viewer">

        <img id="imageViewer" alt="Product Image">

        <video id="videoViewer" controls></video>

        <iframe id="youtubeViewer" allowfullscreen></iframe>

        <model-viewer id="modelViewer"
                                    camera-controls
                                    auto-rotate>
        </model-viewer>

        <div id="viewerLoader" class="viewer-loader">
                Loading...
        </div>

</div>
                <div class="thumbnail-strip" id="thumbnailStrip">

</div>
</div>

            </div>

        </div>


        <!-- RIGHT SIDE -->
        <div class="col-lg-4">
                         <div class="product-info-card">
            <span id="stockStatus"
                  class="stock-badge">
                In Stock
            </span>

            <h1 id="productName"></h1>

           <div class="price-box">

    <span id="salePrice" class="sale-price"></span>

    <span id="originalPrice" class="old-price"></span>

    <span id="discountPercent" class="discount"></span>

</div>
                       <div class="product-meta">

    <div>
        <strong>SKU:</strong>
        <span id="productId"></span>
    </div>

    <div>
        <strong>Category:</strong>
        <span id="category"></span>
    </div>

    <div>
        <strong>Sold:</strong>
        <span id="soldQty"></span>
    </div>

</div>

<div class="rating">

★★★★★

<span id="reviewCount">
(0 Reviews)
</span>

</div>
            <p id="shortDescription"></p>

            <div class="qty-box">

                <button id="minusQty">−</button>

<input
type="number"
id="qty"
value="1"
min="1">

<button id="plusQty">+</button>

            </div>

            <div class="buttons">

                <button id="buyNowBtn" class="buy-btn">
                    Buy Now
                </button>

                <button id="addToCartBtn" class="cart-btn">
                    Add to Cart
                </button>

            </div>

        </div>
             </div>
    </div>

</div>

<!-- Specifications -->

<section class="container mt-5">

    <h3>Specifications</h3>

    <table class="table">

        <tbody id="specTable">

        </tbody>

    </table>

</section>


<!-- Long Description -->

<section class="container mt-4">

    <h3>Description</h3>

    <div id="longDescription"></div>

</section>


<!-- Related Products -->

<section class="container mt-5">

    <h3>Related Products</h3>

    <div class="row"
         id="relatedProducts">
    </div>

</section>


<script src="product.js"></script>

</body>


</html>

<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout | Storix</title>

<link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root{
    --accent:#fb923c;
    --accent2:#f97316;
    --bg:#fff7ed;
    --card:#ffffff;
    --text:#1c1917;
    --muted:#78716c;
    --shadow:0 10px 30px rgba(0,0,0,0.08);
    --radius:16px;
}

body{
    font-family:'Ubuntu',sans-serif;
    margin:0;
    background:var(--bg);
    color:var(--text);
}

.topbar{
    background:#fff;
    border-bottom:1px solid #f3f3f3;
}

.navbar{
    background:white;
    padding:12px 18px;
    box-shadow:var(--shadow);
}

.logo-text{
    font-weight:800;
    font-size:22px;
    background:linear-gradient(45deg,#fb923c,#f97316);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.container-box{
    max-width:1100px;
    margin:35px auto;
    display:grid;
    grid-template-columns:1.2fr 1fr;
    gap:22px;
    padding:0 15px;
}

.card-box{
    background:var(--card);
    padding:22px;
    border-radius:var(--radius);
    box-shadow:var(--shadow);
}

input,textarea{
    width:100%;
    padding:12px;
    margin-bottom:12px;
    border:1px solid #eee;
    border-radius:10px;
    outline:none;
}

input:focus,textarea:focus{
    border-color:var(--accent);
    box-shadow:0 0 0 3px rgba(251,146,60,0.15);
}

.btn-place{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:linear-gradient(45deg,#fb923c,#f97316);
    color:white;
    font-weight:700;
    cursor:pointer;
}

.cart-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px;
    border-radius:12px;
    margin-bottom:10px;
    background:#fffaf5;
    border:1px solid #ffe3d1;
}

.cart-left{
    display:flex;
    align-items:center;
    gap:12px;
}

.cart-img{
    width:55px;
    height:55px;
    border-radius:10px;
    object-fit:cover;
}

.cart-name{
    font-weight:600;
    font-size:14px;
}

.cart-qty{
    font-size:12px;
    color:var(--muted);
}

.remove-btn{
    background:none;
    border:none;
    color:red;
    cursor:pointer;
}

.total-box{
    display:flex;
    justify-content:space-between;
    font-weight:700;
    font-size:18px;
    margin-top:15px;
}

@media(max-width:768px){
    .container-box{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar p-2 text-center">
    <small>
        <a href="https://wa.me/923076380291" style="text-decoration:none;color:inherit;">
            <i class="fab fa-whatsapp"></i> +923076380291
        </a>
    </small>
</div>

<!-- NAV -->
<nav class="navbar d-flex justify-content-between align-items-center">
    <div class="d-flex align-items-center">
        <img src="2.png" style="height:38px;margin-right:10px;">
        <span class="logo-text">Storix</span>
    </div>

    <button class="btn btn-light" onclick="goBack()">
        <i class="fas fa-arrow-left"></i> Back
    </button>
</nav>

<!-- CONTENT -->
<div class="container-box">

    <!-- LEFT -->
    <div class="card-box">
        <h4>Delivery Details</h4>

        <input id="name" placeholder="Full Name">
        <input id="phone" placeholder="Phone">
        <textarea id="address" rows="3" placeholder="Address"></textarea>

        <h5>Payment</h5>
        <label><input type="radio" checked> Cash on Delivery</label>

        <br><br>

        <button class="btn-place" onclick="placeOrder()">Confirm Order</button>
    </div>

    <!-- RIGHT -->
    <div class="card-box">
        <h4>Order Summary</h4>
        <div id="items"></div>

        <div class="total-box">
            <span>Total</span>
            <span id="total">Rs 0</span>
        </div>
    </div>

</div>

<script>
let currencySymbol = "Rs";
let logoText = "Storix";
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function applyRegionSettings() {
    fetch("https://ipapi.co/json/")
    .then(res => res.json())
    .then(data => {
        const country = data.country_code || "PK";

        currencySymbol = (country === "US") ? "$" : "Rs";
        logoText = (country === "US") ? "StorixUS" : "StorixPK";

        document.querySelector(".logo-text").innerText = logoText;

        loadCart();
    })
    .catch(() => loadCart());
}

function loadCart(){
    let container = document.getElementById("items");
    let total = 0;

    container.innerHTML = "";

    if(cart.length === 0){
        container.innerHTML = "<p style='color:#777'>Cart is empty</p>";
        document.getElementById("total").innerText = currencySymbol + " 0";
        return;
    }

    cart.forEach((item,index)=>{
        let price = parseFloat(item.price) || 0;
        let subtotal = price * item.qty;

        total += subtotal;

        container.innerHTML += `
        <div class="cart-item">
            <div class="cart-left">
                <img src="${item.images?.[0] || item.image || ''}" class="cart-img">
                <div>
                    <div class="cart-name">${item.name}</div>
                    <div class="cart-qty">Qty: ${item.qty}</div>
                </div>
            </div>

            <div class="cart-right">
                <div>${currencySymbol} ${subtotal}</div>
                <button class="remove-btn" onclick="removeItem(${index})">✕</button>
            </div>
        </div>`;
    });

    document.getElementById("total").innerText =
        currencySymbol + " " + total;
}

function removeItem(i){
    cart.splice(i,1);
    localStorage.setItem("cart", JSON.stringify(cart));
    loadCart();
}

function goBack(){
    window.history.back();
}

function placeOrder(){
    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let address = document.getElementById("address").value;

    if(!name || !phone || !address){
        alert("Fill all details");
        return;
    }

    if(cart.length === 0){
        alert("Cart is empty");
        return;
    }

    let total = 0;
    let message = "🛒 NEW ORDER\n\n";

    cart.forEach(item=>{
        let subtotal = (parseFloat(item.price)||0) * item.qty;
        total += subtotal;
        message += `${item.name} x${item.qty} = ${currencySymbol}${subtotal}\n`;
    });

    message += `\nTOTAL: ${currencySymbol}${total}`;
    message += `\n\nName: ${name}\nPhone: ${phone}\nAddress: ${address}`;

    window.open(
        "https://wa.me/923076380291?text=" + encodeURIComponent(message),
        "_blank"
    );

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    doc.setFontSize(18);
    doc.text("STORIX INVOICE", 20, 20);

    doc.setFontSize(11);
    doc.text("Name: " + name, 20, 35);
    doc.text("Phone: " + phone, 20, 42);
    doc.text("Address: " + address, 20, 49);

    let y = 65;

    cart.forEach((item,i)=>{
        let subtotal = (parseFloat(item.price)||0) * item.qty;
        doc.text(`${i+1}. ${item.name} x${item.qty}`, 20, y);
        doc.text(`${currencySymbol}${subtotal}`, 160, y);
        y += 10;
    });

    doc.text(`TOTAL: ${currencySymbol}${total}`, 20, y+10);

    const img = new Image();
    img.src = "2.png";

    img.onload = function(){
        doc.addImage(img, "PNG", 60, 80, 80, 80);
        doc.save(`Storix_Invoice_${Date.now()}.pdf`);
    };

    localStorage.removeItem("cart");
    setTimeout(()=>location.reload(), 1200);
}

applyRegionSettings();
</script>

</body>
</html>
